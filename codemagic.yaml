# Codemagic CI/CD configuration for KalmFu Panda
workflows:
  ios-workflow:
    name: iOS Build
    environment:
      vars:
        FLUTTER_VERSION: "3.24.5"
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Clean build
        script: |
          cd ios && rm -rf Pods Podfile.lock .symlinks && cd ..
      - name: Install CocoaPods
        script: |
          cd ios && pod install && cd ..
      - name: Install Flutter
        script: |
          flutter pub get
      - name: Build iOS (no codesign)
        script: |
          flutter build ios --release --no-codesign
    publishing:
      app_store_connect:
        apple_id: $APPLE_ID
        api_key: $APP_STORE_CONNECT_API_KEY_ISSUER_ID
