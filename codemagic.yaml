# Codemagic CI/CD configuration for KalmFu Panda
workflows:
  ios-workflow:
    name: iOS App Store Build
    environment:
      vars:
        FLUTTER_VERSION: "3.24.5"
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    signing:
      profiles:
        - profile: codemagic
          platform: ios
          bundle_id: com.kalmfu.panda
          autoprovision: true
          signing_type: app_store
    scripts:
      - name: Clean build
        script: |
          cd ios && rm -rf Pods Podfile.lock .symlinks && cd ..
      - name: Install CocoaPods
        script: |
          cd ios && pod install && cd ..
      - name: Install Flutter
        script: |
          flutter pub get
      - name: Build iOS IPA for App Store
        script: |
          flutter build ipa --release
    publishing:
      app_store_connect:
        apple_id: anupatwritnun@gmail.com
        issuer_id: d1d4fd43-48c1-4027-ae88-b3651d497396
        key_id: HX3GW7MKG2
        submit_to_testflight: false
        submit_to_app_store: false
